<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B241D"/>
      <stop offset="55%" stop-color="#07332A"/>
      <stop offset="100%" stop-color="#052A22"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2CE0A6"/>
      <stop offset="100%" stop-color="#0E9A74"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2CE0A6"/>
      <stop offset="60%" stop-color="#2CE0A6" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#2CE0A6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2CE0A6" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#2CE0A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="170" r="330" fill="url(#glow)"/>

  <!-- mark: 512 units -> 76px, occupies x 84-160, y 96-172 -->
  <g transform="translate(84,96) scale(0.1484)">
    <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="54"/>
    <path d="M 66 256 L 170 256 L 212 168 L 288 344 L 330 256 L 446 256"
          fill="none" stroke="#EAFBF4" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark, clear of the mark -->
  <text x="180" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        font-weight="bold" fill="#F2FBF7">Ospia</text>
  <g transform="translate(316,120)">
    <rect x="0" y="0" width="66" height="30" rx="4" fill="none" stroke="#2CE0A6" stroke-opacity=".55"/>
    <text x="33" y="21" text-anchor="middle" font-family="Consolas, 'Courier New', monospace"
          font-size="15" fill="#4EDCAF" letter-spacing="2.5">HOS</text>
  </g>

  <rect x="84" y="212" width="1032" height="1" fill="url(#rule)"/>

  <!-- headline -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" fill="#F4FBF8">
    <tspan x="84" y="308">Every other system records</tspan>
    <tspan x="84" y="382">what happened.</tspan>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="62" font-style="italic"
        font-weight="bold" fill="#4EDCAF">
    <tspan x="84" y="456">This one runs the place.</tspan>
  </text>

  <!-- footer -->
  <text x="84" y="546" font-family="Consolas, 'Courier New', monospace" font-size="20"
        fill="#9FC4B7" letter-spacing="1.2">the Hospital Operating System</text>
  <text x="84" y="582" font-family="Consolas, 'Courier New', monospace" font-size="17"
        fill="#7BA093" letter-spacing="1">intent over navigation  ·  events over coupling  ·  configuration over code</text>
</svg>
